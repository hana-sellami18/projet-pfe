<!-- profil.html -->
<div class="profil-wrapper">
  <div class="profil-inner">

    <!-- ══ BLOC UNIQUE ══ -->
    <div class="profil-bloc">

      <!-- ── HERO ── -->
      <div class="profil-hero">

        <button class="profil-back-btn" (click)="retour.emit()" title="Retour">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="#A0724A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>

        <!-- Avatar -->
        <label class="profil-avatar">
          <img *ngIf="avatarPreview" [src]="avatarPreview" alt="Photo"/>
          <span class="profil-avatar-initials" *ngIf="!avatarPreview">{{ initiales }}</span>
          <div class="profil-avatar-overlay">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </div>
          <input type="file" class="profil-avatar-input" accept="image/*" (change)="onAvatarChange($event)"/>
        </label>

        <h1 class="profil-hero-name">{{ profil.prenom }} {{ profil.nom }}</h1>
        <p class="profil-hero-role">{{ profil.role }}</p>
        <div class="profil-hero-divider"></div>
        <p class="profil-hero-dept">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="#F5821F" stroke-width="2" stroke-linecap="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          {{ profil.departement }}
        </p>

        <button class="profil-btn-edit-hero" (click)="toggleEdit()" *ngIf="!editMode">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="white" stroke-width="2.2" stroke-linecap="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Modifier le profil
        </button>
      </div>

      <!-- ── BANDE ORANGE ── -->
      <div class="profil-band"></div>

      <!-- ── SECTION INFOS ── -->
      <div class="profil-infos">

        <div class="profil-infos-head">
          <div class="profil-infos-ico">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="#F5821F" stroke-width="2.2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="profil-infos-title">Informations personnelles</span>
        </div>

        <!-- MODE LECTURE -->
        <div class="profil-fields-list" *ngIf="!editMode">

          <div class="profil-field-item">
            <div class="profil-field-ico">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2" stroke-linecap="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="profil-field-body">
              <span class="profil-label">Nom complet</span>
              <span class="profil-value">{{ profil.prenom }} {{ profil.nom }}</span>
            </div>
          </div>

          <div class="profil-field-item">
            <div class="profil-field-ico">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2" stroke-linecap="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div class="profil-field-body">
              <span class="profil-label">Adresse email</span>
              <span class="profil-value">{{ profil.email }}</span>
            </div>
          </div>

          <div class="profil-field-item">
            <div class="profil-field-ico">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2" stroke-linecap="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8a16 16 0 006.29 6.29l1.14-1.14a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
              </svg>
            </div>
            <div class="profil-field-body">
              <span class="profil-label">Téléphone</span>
              <span class="profil-value">{{ profil.telephone || '—' }}</span>
            </div>
          </div>

          <div class="profil-field-item">
            <div class="profil-field-ico">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2" stroke-linecap="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </div>
            <div class="profil-field-body">
              <span class="profil-label">Département</span>
              <span class="profil-value">{{ profil.departement }}</span>
            </div>
          </div>

          <div class="profil-field-item">
            <div class="profil-field-ico">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2" stroke-linecap="round">
                <rect x="2" y="7" width="20" height="14" rx="2"/>
                <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
              </svg>
            </div>
            <div class="profil-field-body">
              <span class="profil-label">Rôle</span>
              <span class="profil-value">{{ profil.role }}</span>
            </div>
          </div>

        </div>

        <!-- MODE ÉDITION -->
        <div class="profil-edit-list" *ngIf="editMode">

          <div class="profil-edit-field">
            <label class="profil-edit-label">Prénom</label>
            <div class="profil-input-wrap">
              <span class="profil-input-ico">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C89870" stroke-width="2" stroke-linecap="round">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input class="profil-input" [(ngModel)]="editData.prenom" placeholder="Prénom"/>
            </div>
          </div>

          <div class="profil-edit-field">
            <label class="profil-edit-label">Nom</label>
            <div class="profil-input-wrap">
              <span class="profil-input-ico">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C89870" stroke-width="2" stroke-linecap="round">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input class="profil-input" [(ngModel)]="editData.nom" placeholder="Nom"/>
            </div>
          </div>

          <div class="profil-edit-field">
            <label class="profil-edit-label">Adresse email</label>
            <div class="profil-input-wrap">
              <span class="profil-input-ico">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C89870" stroke-width="2" stroke-linecap="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </span>
              <input class="profil-input" type="email" [(ngModel)]="editData.email" placeholder="Email"/>
            </div>
          </div>

          <div class="profil-edit-field">
            <label class="profil-edit-label">Téléphone</label>
            <div class="profil-input-wrap">
              <span class="profil-input-ico">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C89870" stroke-width="2" stroke-linecap="round">
                  <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8a16 16 0 006.29 6.29l1.14-1.14a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
                </svg>
              </span>
              <input class="profil-input" [(ngModel)]="editData.telephone" placeholder="+216 XX XXX XXX"/>
            </div>
          </div>

          <div class="profil-edit-field">
            <label class="profil-edit-label">Département</label>
            <div class="profil-input-wrap">
              <span class="profil-input-ico">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C89870" stroke-width="2" stroke-linecap="round">
                  <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                  <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
              </span>
              <input class="profil-input" [(ngModel)]="editData.departement" placeholder="Département"/>
            </div>
          </div>

          <div class="profil-edit-field">
            <label class="profil-edit-label">Rôle</label>
            <div class="profil-input-wrap">
              <span class="profil-input-ico">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C89870" stroke-width="2" stroke-linecap="round">
                  <rect x="2" y="7" width="20" height="14" rx="2"/>
                  <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
                </svg>
              </span>
              <input class="profil-input" [(ngModel)]="editData.role" placeholder="Rôle"/>
            </div>
          </div>

        </div>

        <!-- FOOTER ÉDITION -->
        <div class="profil-edit-footer" *ngIf="editMode">
          <button class="profil-btn-cancel" (click)="cancelEdit()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Annuler
          </button>
          <button class="profil-btn-save" (click)="saveEdit()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Enregistrer les modifications
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
