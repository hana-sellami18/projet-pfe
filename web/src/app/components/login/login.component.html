<div class="auth-wrapper">

  <!-- Décoration fond -->
  <div class="deco-circle top-left"></div>
  <div class="deco-circle bottom-right"></div>

  <div class="auth-card">

    <!-- Logo ASM -->
    <div class="auth-logo">
      <img src="assets/logo-asm.png" alt="ASM Logo" />
    </div>

    <!-- Titre -->
    <div class="auth-header">
      <h1 class="auth-title">Bienvenue</h1>
      <p class="auth-subtitle">Connectez-vous à votre espace RH</p>
    </div>

    <!-- Badge rôle -->
    <div class="auth-role-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
      </svg>
      Accès Ressources Humaines
    </div>

    <!-- Champ Email -->
    <div class="auth-field">
      <label class="auth-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Adresse e-mail
      </label>
      <div class="auth-input-wrapper">
        <svg class="auth-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input
          type="email"
          name="email"
          [(ngModel)]="loginData.email"
          placeholder="exemple@entreprise.com"
          class="auth-input"
        />
      </div>
    </div>

    <!-- Champ Mot de passe -->
    <div class="auth-field">
      <label class="auth-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        Mot de passe
      </label>
      <div class="auth-input-wrapper">
        <svg class="auth-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input
          type="password"
          name="password"
          [(ngModel)]="loginData.password"
          placeholder="••••••••"
          class="auth-input"
        />
      </div>
    </div>

    <!-- Bouton connexion -->
    <button class="auth-btn" (click)="onLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Se connecter
    </button>

    <!-- Divider -->
    <div class="auth-divider">
      <span></span>
      <p>ou</p>
      <span></span>
    </div>

    <!-- Footer -->
    <p class="auth-footer">
      Pas encore de compte ?
      <span class="auth-link" (click)="goToRegister()">Créer un compte</span>
    </p>

  </div>
</div>
