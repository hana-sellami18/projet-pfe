<div class="auth-wrapper">

  <!-- Décoration fond -->
  <div class="deco-circle top-left"></div>
  <div class="deco-circle bottom-right"></div>

  <div class="auth-card">

    <!-- Logo ASM -->
    <div class="auth-logo">
      <img src="assets/logo-asm.png" alt="ASM Logo" />
    </div>

    <!-- Titre -->
    <div class="auth-header">
      <h1 class="auth-title">Inscription</h1>
      <p class="auth-subtitle">Créez votre compte RH</p>
    </div>

    <!-- Badge rôle -->
    <div class="auth-role-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
      </svg>
      Nouveau compte Ressources Humaines
    </div>

    <!-- Nom complet -->
    <div class="auth-field">
      <label class="auth-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Nom complet
      </label>
      <div class="auth-input-wrapper">
        <svg class="auth-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input
          type="text"
          name="nomComplet"
          [(ngModel)]="regData.nomComplet"
          placeholder="Ex: Ahmed Ben Ali"
          class="auth-input"
        />
      </div>
    </div>

    <!-- Email -->
    <div class="auth-field">
      <label class="auth-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Adresse e-mail
      </label>
      <div class="auth-input-wrapper">
        <svg class="auth-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input
          type="email"
          name="email"
          [(ngModel)]="regData.email"
          placeholder="exemple@entreprise.com"
          class="auth-input"
        />
      </div>
    </div>

    <!-- Téléphone -->
    <div class="auth-field">
      <label class="auth-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        Téléphone
      </label>
      <div class="auth-input-wrapper">
        <svg class="auth-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        <input
          type="text"
          name="telephone"
          [(ngModel)]="regData.telephone"
          placeholder="Ex: +216 XX XXX XXX"
          class="auth-input"
        />
      </div>
    </div>

    <!-- Date de naissance -->
    <div class="auth-field">
      <label class="auth-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Date de naissance
      </label>
      <div class="auth-input-wrapper">
        <svg class="auth-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <input
          type="date"
          name="dateNaissance"
          [(ngModel)]="regData.dateNaissance"
          class="auth-input auth-input-date"
        />
      </div>
    </div>

    <!-- Mot de passe -->
    <div class="auth-field">
      <label class="auth-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        Mot de passe
      </label>
      <div class="auth-input-wrapper">
        <svg class="auth-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input
          type="password"
          name="password"
          [(ngModel)]="regData.password"
          placeholder="••••••••"
          class="auth-input"
        />
      </div>
    </div>

    <!-- Bouton inscription -->
    <button class="auth-btn" (click)="onRegister()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
      Créer mon compte
    </button>

    <!-- Divider -->
    <div class="auth-divider">
      <span></span>
      <p>ou</p>
      <span></span>
    </div>

    <!-- Footer -->
    <p class="auth-footer">
      Déjà un compte ?
      <span class="auth-link" (click)="goToLogin()">Se connecter</span>
    </p>

  </div>
</div>
